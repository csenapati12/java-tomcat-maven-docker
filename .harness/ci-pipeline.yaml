pipeline:
  name: harness-remote
  identifier: harnessremote
  projectIdentifier: harnessci
  orgIdentifier: default

  properties:
    ci:
      codebase:
        connectorRef: github_conn
        repoName: java-tomcat-maven-docker
        build:
          type: branch
          spec:
            branch: master

  stages:
    - stage:
        name: Build_and_Package
        identifier: build_and_package
        type: CI
        spec:
          cloneCodebase: true

          infrastructure:
            type: Cloud
            spec:
              connectorRef: account.harnessImage   # 👈 FIX

          execution:
            steps:
              - step:
                  type: Run
                  name: Verify Repo
                  identifier: verify_repo
                  spec:
                    shell: Sh
                    command: |
                      pwd
                      ls -lrt

              - step:
                  type: Run
                  name: Maven Build
                  identifier: maven_build
                  spec:
                    image: maven:3.9.6-eclipse-temurin-17
                    shell: Sh
                    command: |
                      mvn clean package -DskipTests

              - step:
                  type: Run
                  name: Verify WAR
                  identifier: verify_war
                  spec:
                    shell: Sh
                    command: |
                      ls -lrt target/ || echo "No target folder"
                      ls target/*.war || echo "No WAR found"
